name: Deploy to Production

# Trigger on push to main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            echo "🚀 Starting deployment..."

            # Navigate to project
            cd /home/ubuntu/dommma

            # Fix stale git refs (prevents "cannot lock ref" errors)
            rm -rf .git/refs/remotes/origin
            git gc --prune=now 2>/dev/null || true

            # Pull latest code
            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard FETCH_HEAD

            # Backend updates
            echo "🐍 Updating backend..."
            source backend/venv/bin/activate
            pip install -r backend/requirements.txt --quiet
            pm2 restart all 2>/dev/null || pm2 restart dommma-backend 2>/dev/null || true

            # Frontend updates
            echo "⚛️ Building frontend..."
            cd frontend

            # Use Node 22 (required by @capacitor/cli v8+)
            export PATH="/usr/local/bin:$PATH"
            node --version

            # Fix permissions BEFORE install/build (build/ is owned by www-data from last deploy)
            sudo chown -R ubuntu:ubuntu build/ 2>/dev/null || true

            yarn install --silent

            # Build frontend (CI=false so ESLint warnings don't fail the build)
            CI=false yarn build

            # Set permissions for Nginx
            sudo chown -R www-data:www-data build/
            sudo chmod -R 755 build/

            # Restart Nginx
            sudo systemctl restart nginx

            echo "✅ Deployment complete!"
